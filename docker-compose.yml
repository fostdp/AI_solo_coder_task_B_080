version: '3.8'

services:
  # 时序数据库 - 存储传感器时序数据
  timescaledb:
    image: timescale/timescaledb:2.13.0-pg15
    container_name: aqueduct-timescaledb
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: aqueduct_monitor
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      TIMESCALEDB_TELEMETRY: "off"
    volumes:
      - timescaledb_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d aqueduct_monitor"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    command: >
      postgres
      -c shared_preload_libraries=timescaledb
      -c work_mem=64MB
      -c maintenance_work_mem=256MB
      -c effective_cache_size=2GB
      -c checkpoint_completion_target=0.9
      -c wal_buffers=16MB
    networks:
      - aqueduct-net

  # MQTT 消息代理 - 处理传感器消息传递
  mosquitto:
    image: eclipse-mosquitto:2.0.18
    container_name: aqueduct-mqtt
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mqtt/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
    healthcheck:
      test: ["CMD-SHELL", "mosquitto_sub -t '$$SYS/#' -C 1 -W 2 -h localhost || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - aqueduct-net

  # Go 后端服务 - 核心业务逻辑 API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: aqueduct-backend
    ports:
      - "8080:8080"
    env_file:
      - ./backend/.env
    depends_on:
      timescaledb:
        condition: service_healthy
      mosquitto:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    restart: unless-stopped
    command: sh -c "sleep 15 && /usr/local/bin/aqueduct-monitor"
    volumes:
      - ./mqtt_queue:/app/mqtt_queue
    networks:
      - aqueduct-net

  # 传感器模拟器 - 可选启动，用于生成模拟数据
  simulator:
    build:
      context: .
      dockerfile: ./backend/Dockerfile.simulator
    container_name: aqueduct-simulator
    profiles: ["simulator"]
    depends_on:
      backend:
        condition: service_healthy
    environment:
      API_BASE: http://backend:8080/api
    restart: unless-stopped
    command: ["-interval=3600", "-backfill-days=365", "-inject-weathering=1.0", "-inject-deformation=1.0", "-seed=42"]
    networks:
      - aqueduct-net

  # Prometheus 监控 - 可选启动，用于系统指标监控
  prometheus:
    image: prom/prometheus:latest
    container_name: aqueduct-prometheus
    profiles: ["monitoring"]
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command: --config.file=/etc/prometheus/prometheus.yml --storage.tsdb.path=/prometheus --storage.tsdb.retention.time=30d
    restart: unless-stopped
    networks:
      - aqueduct-net

  # MQTT Explorer - 可选启动，用于 MQTT 消息可视化调试
  mqtt-explorer:
    image: smeagolworms4/mqtt-explorer:latest
    container_name: aqueduct-mqtt-explorer
    profiles: ["monitoring"]
    ports:
      - "4000:4000"
    environment:
      HTTP_PORT: 4000
      CONFIG_PATH: /mqtt-explorer/config
    volumes:
      - mqtt_explorer_config:/mqtt-explorer/config
    depends_on:
      - mosquitto
    restart: unless-stopped
    networks:
      - aqueduct-net

volumes:
  timescaledb_data:
  mosquitto_data:
  mosquitto_log:
  prometheus_data:
  mqtt_explorer_config:

networks:
  aqueduct-net:
    driver: bridge
